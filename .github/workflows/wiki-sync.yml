# Sync repository docs/ to GitHub Wiki
#
# Prerequisites:
# 1. Enable the Wiki on the GitHub repository (Settings → Features → Wiki) and create at least one page
#    so the wiki Git repository exists.
# 2. Add a fine-grained or classic PAT with **Contents: Read and write** on the wiki repository as secret
#    WIKI_PUSH_TOKEN (repo scope including wiki; GitHub's default GITHUB_TOKEN cannot push to wiki).
#
# Wiki home page is Home.md; README.md from docs/ is copied to Home.md.

name: Sync docs to Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**/*.md"
      - "docs/embed.go"
      - ".github/workflows/wiki-sync.yml"

permissions:
  contents: read

jobs:
  sync:
    if: ${{ secrets.WIKI_PUSH_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout wiki
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.WIKI_PUSH_TOKEN }}

      - name: Copy Markdown to wiki
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in docs/*.md; do
            base="$(basename "$f")"
            cp "$f" "wiki/$base"
          done
          if [[ -f wiki/README.md ]]; then
            mv wiki/README.md wiki/Home.md
          fi
          # In-wiki navigation: GitHub wiki resolves sibling pages from title, not /documentation paths.
          perl -pi -e 's|\(/documentation/([a-z0-9-]+)\)|($1)|g' wiki/*.md

      - name: Commit and push wiki
        run: |
          set -euo pipefail
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No wiki changes."
            exit 0
          fi
          git commit -m "Sync docs from ${{ github.repository }}@${{ github.sha }}"
          git push
