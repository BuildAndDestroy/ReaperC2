apiVersion: v1
kind: Pod
metadata:
  name: debug-pod
  namespace: reaperc2-ns
spec:
  containers:
    - name: debug-container
      image: busybox
      command: ["/bin/sh", "-c", "sleep 3600"]
      stdin: true
      tty: true
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi
