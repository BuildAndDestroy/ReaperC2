# Operator AI on AWS EKS — cloud providers only (no in-cluster Ollama).
# API keys: Secret reaperc2-ai-secrets (see examples below and ../operator-ai.yaml).
apiVersion: v1
kind: ConfigMap
metadata:
  name: reaperc2-ai-config
data:
  REAPER_AI_ENABLED: "1"
  REAPER_AI_DEFAULT_MODEL: "auto"
  REAPER_AI_DEFAULT_PROVIDER: "bedrock"
  REAPER_AI_MAX_TOKENS: "2048"
  # AWS Bedrock (prefer IRSA: REAPER_AI_BEDROCK_USE_IAM=1 on the ReaperC2 ServiceAccount when configured)
  REAPER_AI_BEDROCK_ENABLED: "1"
  REAPER_AI_BEDROCK_REGION: "us-east-1"
  # REAPER_AI_BEDROCK_USE_IAM: "1"
  # Inference profile IDs (see pkg/ai/bedrock_models.go):
  # REAPER_AI_BEDROCK_MODELS: "us.anthropic.claude-sonnet-4-6,us.anthropic.claude-opus-4-7"
  # Or one unified list (overrides per-provider *_MODELS when set):
  # REAPER_AI_MODELS: "bedrock:us.anthropic.claude-sonnet-4-6,openai:gpt-4o-mini"
  # Optional OpenAI / Anthropic (keys in reaperc2-ai-secrets):
  # REAPER_AI_OPENAI_MODELS: "gpt-4o-mini,gpt-4o"
  # REAPER_AI_ANTHROPIC_MODELS: "claude-sonnet-4-20250514"
