# ECR or other private registry pull secret. Prefer creating from your local docker config:
#
#   kubectl create secret docker-registry reaperc2-myregistrykey \
#     --namespace=reaperc2-ns \
#     --docker-server=ACCOUNT.dkr.ecr.us-east-1.amazonaws.com \
#     --docker-username=AWS \
#     --docker-password="$(aws ecr get-login-password --region us-east-1)" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Or from ~/.docker/config.json:
#
#   kubectl create secret generic reaperc2-myregistrykey \
#     --namespace=reaperc2-ns \
#     --from-file=.dockerconfigjson=$HOME/.docker/config.json \
#     --type=kubernetes.io/dockerconfigjson \
#     --dry-run=client -o yaml | kubectl apply -f -
