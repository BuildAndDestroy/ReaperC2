# Copy and edit before apply. ReaperC2 reads these via MONGO_* env vars (DocumentDB is MongoDB-compatible).
# host: your DocumentDB cluster endpoint from your infrastructure repository.
apiVersion: v1
kind: Secret
metadata:
  name: reaperc2-documentdb-credentials
  namespace: reaperc2-ns
type: Opaque
stringData:
  host: "YOUR_CLUSTER_ID.cluster-XXXXXXXX.us-east-1.docdb.amazonaws.com"
  port: "27017"
  username: "api_user"
  password: "CHANGE_ME"
  database: "api_db"
