# Optional one-shot Job: create the application DB user (requires DocumentDB master/admin creds).
#
#   kubectl apply -f examples/documentdb-admin-secret.local.yaml
#   kubectl apply -f examples/documentdb-secret.local.yaml
#   kubectl apply -f docdb-init-user-job.yaml
#   kubectl wait -n reaperc2-ns job/docdb-init-user --for=condition=complete --timeout=120s
apiVersion: batch/v1
kind: Job
metadata:
  name: docdb-init-user
  namespace: reaperc2-ns
  labels:
    app: docdb-init-user
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app: docdb-init-user
    spec:
      restartPolicy: Never
      containers:
        - name: init-user
          image: mongo:7.0
          command: ["/bin/bash", "/scripts/docdb-init-user.sh"]
          env:
            - name: MONGO_TLS_CA_FILE
              value: "/certs/rds-combined-ca-bundle.pem"
            - name: MONGO_AUTH_SOURCE
              value: "admin"
            - name: MONGO_HOST
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-credentials
                  key: host
            - name: MONGO_PORT
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-credentials
                  key: port
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-credentials
                  key: username
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-credentials
                  key: password
            - name: MONGO_DATABASE
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-credentials
                  key: database
            - name: MONGO_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-admin
                  key: username
            - name: MONGO_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: reaperc2-documentdb-admin
                  key: password
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: ca-cert
              mountPath: /certs
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            name: docdb-init-scripts
            defaultMode: 0555
        - name: ca-cert
          configMap:
            name: docdb-ca-cert
