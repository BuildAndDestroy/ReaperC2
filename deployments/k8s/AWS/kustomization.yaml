apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: reaperc2-ns

resources:
  - namespace.yaml
  - ai-config.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - ingressroute.yaml

# Download the RDS trust bundle first: ./fetch-docdb-ca-bundle.sh
configMapGenerator:
  - name: docdb-ca-cert
    files:
      - rds-combined-ca-bundle.pem
    options:
      disableNameSuffixHash: true
  - name: docdb-init-scripts
    files:
      - scripts/docdb-common.sh
      - scripts/docdb-init.sh
      - scripts/docdb-init.js
      - scripts/docdb-init-user.sh
      - scripts/docdb-create-user.js
    options:
      disableNameSuffixHash: true
