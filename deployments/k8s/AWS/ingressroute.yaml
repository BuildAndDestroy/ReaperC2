apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: reaperc2-ingressroute
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ai-metrics.outsystemscloud.ai`)
      kind: Rule
      services:
        - name: reaperc2-service
          port: 8080
  tls:
    certResolver: letsencrypt
